###########
# fe2 is a CNAME on the default DynDNS entry. It should route to FE2 only.
###########

server {
    listen      443 ssl;
    listen [::]:443 ssl;
    http2 on;
    
    server_name fe2.ffw-baudenbach.de;

    include /etc/nginx/conf.d/includes/ssl.conf;
    include /etc/nginx/conf.d/includes/hardening.conf;

    ###########
    # FE2
    ###########

    # Block "Externe Schnittstelle" via GET
    location ^~ /rest/external/http {
        if ($request_method = GET) {
            return 403;
        }
    }

    # Proxy for FE2
    location / {
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_buffering off;

        proxy_pass http://192.168.112.1:83;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

}
