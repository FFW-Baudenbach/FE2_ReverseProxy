################################################
# monitoring is a CNAME on the default DynDNS entry. It should route to uptime kuma only.
################################################

server {
    listen      443 ssl;
    listen [::]:443 ssl;
    http2 on;
    
    server_name monitoring.ffw-baudenbach.de;
    
    ################################################
    # SSL
    ################################################

    ssl_certificate /etc/letsencrypt/live/haus.ffw-baudenbach.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/haus.ffw-baudenbach.de/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/haus.ffw-baudenbach.de/chain.pem;
    ssl_dhparam /etc/letsencrypt/dhparams/dhparam.pem;

    ################################################
    # Hardening
    ################################################

    include /etc/nginx/conf.d/includes/hardening.conf;

    ################################################
    # UptimeKuma
    ################################################

    location / {
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 3600s;
        proxy_buffering off;

        proxy_pass http://192.168.112.200:3001/;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

}
